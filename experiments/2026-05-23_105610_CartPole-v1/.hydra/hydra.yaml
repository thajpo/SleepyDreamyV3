hydra:
  run:
    dir: experiments/${now:%Y-%m-%d}_${now:%H%M%S}_${environment.environment_name}
  sweep:
    dir: experiments/sweeps/${now:%Y-%m-%d}_${now:%H%M}
    subdir: ${hydra.job.override_dirname}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=RUN
    task:
    - env=cartpole_state_only
    - train.max_train_steps=20
    - general.dry_run=true
    - train.num_collectors=1
    - train.min_buffer_episodes=2
    - train.replay_buffer_size=10
    - train.batch_size=2
    - train.sequence_length=8
    - train.replay_burn_in=2
    - train.eval_every=0
    - train.actor_warmup_steps=0
    - train.q_critic_scale=1.0
    - train.actor_loss_mode=qcritic
  job:
    name: main
    chdir: false
    override_dirname: env=cartpole_state_only,general.dry_run=true,train.actor_loss_mode=qcritic,train.actor_warmup_steps=0,train.batch_size=2,train.eval_every=0,train.max_train_steps=20,train.min_buffer_episodes=2,train.num_collectors=1,train.q_critic_scale=1.0,train.replay_buffer_size=10,train.replay_burn_in=2,train.sequence_length=8
    id: ???
    num: ???
    config_name: config
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /home/j/Projects/SleepyDreamyV3
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: dreamer.conf
      schema: pkg
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /home/j/Projects/SleepyDreamyV3/experiments/2026-05-23_105610_CartPole-v1
    choices:
      env: cartpole_state_only
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
