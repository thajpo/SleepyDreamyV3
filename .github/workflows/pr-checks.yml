name: pr-checks

on:
  pull_request:
  push:
    branches:
      - master
      - main

permissions:
  contents: read

concurrency:
  group: pr-checks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          version: "0.11.16"

      - name: Install CPU development environment
        run: uv sync --frozen --extra cpu

      - name: Compile Python sources
        run: python -m compileall -q src tests scripts

      - name: Type-check reliability boundaries
        run: >-
          uvx --from pyright==1.1.407 pyright
          src/dreamer/config.py
          src/dreamer/main.py
          src/dreamer/run_manifest.py
          src/dreamer/run_registry.py
          src/dreamer/trainer/checkpoints.py
          src/dreamer/runtime/replay_buffer.py
          src/dreamer/runtime/model_transport.py

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          version: "0.11.16"

      - name: Install CPU development environment
        run: uv sync --frozen --extra cpu

      - name: Run tests
        run: uv run --extra cpu pytest -q
