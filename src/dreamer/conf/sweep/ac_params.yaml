# Historical Actor-Critic parameter grid; not an authored sweep default.
# Varying actor rate independently requires the legacy optimizer contract and a
# preregistered hypothesis, seed set, sample budget, metric, and stop rule.

hydra:
  sweeper:
    params:
      train.actor_lr: 1e-5,3e-5,1e-4
      train.actor_entropy_coef: 1e-3,5e-3,1e-2,3e-2
